<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Code Playground</title>

<style>

:root{
--bg:linear-gradient(135deg,#fff7ed,#fff3e8);
--panel:rgba(255,255,255,0.75);
--border:#fed7aa;
--accent:#f59e0b;
--shadow:0 12px 35px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
font-family:system-ui;
background:var(--bg);
overflow:hidden;
display:flex;
flex-direction:column;
}

/* HEADER */

header{
height:52px;
display:flex;
align-items:center;
padding:0 20px;
font-weight:600;
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--border);
}

/* LAYOUT */

.main{
flex:1;
display:flex;
gap:16px;
padding:16px;
}

/* PANELS */

.editor-panel,
.preview-panel{
background:var(--panel);
backdrop-filter:blur(10px);
border:1px solid var(--border);
border-radius:18px;
box-shadow:var(--shadow);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* EDITOR */

.editor-panel{
flex:0 0 420px;
position:relative;
}

.editor-header{
height:46px;
display:flex;
align-items:center;
padding:0 16px;
border-bottom:1px solid var(--border);
font-size:14px;
}

/* BUTTON */

button{
padding:7px 14px;
border-radius:10px;
border:none;
background:#f59e0b;
color:white;
font-weight:600;
cursor:pointer;
transition:.15s;
}

button:hover{
transform:translateY(-1px);
filter:brightness(1.05);
}

/* DOWNLOAD */

.download-btn{
position:absolute;
top:8px;
right:10px;
width:36px;
height:36px;
padding:0;
}

/* CODE AREA */

.code-area{
flex:1;
position:relative;
}

#lineNumbers{
position:absolute;
left:0;
top:0;
bottom:0;
width:48px;
padding-top:14px;
text-align:right;
padding-right:6px;
font-family:monospace;
font-size:14px;
color:#9ca3af;
background:rgba(255,255,255,0.5);
border-right:1px solid var(--border);
}

#code{
position:absolute;
inset:0;
padding:14px 16px 14px 60px;
border:none;
outline:none;
resize:none;
font-family:Consolas,monospace;
font-size:14px;
background:white;
color:black;
}

/* DRAG OVER */

#code.drag{
background:#fff7ed;
outline:3px dashed var(--accent);
}

/* RESIZER */

.resizer{
width:10px;
cursor:col-resize;
background:rgba(0,0,0,0.05);
border-radius:10px;
}

/* PREVIEW */

.preview-panel{
flex:1;
}

.preview-toolbar{
height:48px;
display:flex;
align-items:center;
gap:10px;
padding:0 16px;
border-bottom:1px solid var(--border);
background:rgba(255,255,255,0.6);
}

.preview-content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

#preview-frame{
width:100%;
height:100%;
border-radius:16px;
overflow:hidden;
border:2px solid var(--accent);
}

#preview{
width:100%;
height:100%;
border:none;
background:white;
}

#preview-frame.desktop{max-width:1400px}
#preview-frame.tablet{width:780px}
#preview-frame.mobile{width:380px}

</style>
</head>

<body>

<header>Live Code Playground</header>

<div class="main">

<div class="editor-panel" id="editorPanel">

<div class="editor-header">Drag a file here or type code</div>

<button class="download-btn" id="downloadBtn">↓</button>

<div class="code-area">

<div id="lineNumbers"></div>

<textarea id="code"></textarea>

</div>

</div>

<div class="resizer" id="resizer"></div>

<div class="preview-panel">

<div class="preview-toolbar">

<button data-size="desktop">Computer</button>
<button data-size="tablet">Tablet</button>
<button data-size="mobile">Phone</button>
<button id="fullscreenBtn">Fullscreen</button>

</div>

<div class="preview-content">

<div id="preview-frame" class="desktop">
<iframe id="preview"></iframe>
</div>

</div>

</div>

</div>

<script>

const code=document.getElementById("code")
const preview=document.getElementById("preview")
const numbers=document.getElementById("lineNumbers")
const frame=document.getElementById("preview-frame")
const resizer=document.getElementById("resizer")
const left=document.getElementById("editorPanel")

/* UPDATE LINES */

function updateLines(){
const count=(code.value.match(/\n/g)||[]).length+1
numbers.textContent=Array.from({length:count},(_,i)=>i+1).join("\n")
}

/* RUN PREVIEW */

function updatePreview(){
const doc=preview.contentDocument
doc.open()
doc.write(code.value)
doc.close()
}

code.addEventListener("input",()=>{
updateLines()
updatePreview()
})

/* DRAG DROP FILE */

code.addEventListener("dragover",e=>{
e.preventDefault()
code.classList.add("drag")
})

code.addEventListener("dragleave",()=>{
code.classList.remove("drag")
})

code.addEventListener("drop",e=>{
e.preventDefault()

code.classList.remove("drag")

const file=e.dataTransfer.files[0]

if(!file)return

const reader=new FileReader()

reader.onload=event=>{

let text=event.target.result

const ext=file.name.split(".").pop().toLowerCase()

if(ext==="html"){
code.value=text
}

else if(ext==="css"){
code.value="<style>\n"+text+"\n</style>"
}

else if(ext==="js"){
code.value="<script>\n"+text+"\n<\/script>"
}

else if(ext==="png"||ext==="jpg"||ext==="jpeg"||ext==="gif"){
code.value=`<img src="${event.target.result}" style="max-width:100%">`
}

else{
code.value=text
}

updateLines()
updatePreview()

}

if(file.type.startsWith("image")){
reader.readAsDataURL(file)
}else{
reader.readAsText(file)
}

})

/* FULLSCREEN */

document.getElementById("fullscreenBtn").onclick=()=>{
if(!document.fullscreenElement){
frame.requestFullscreen()
}else{
document.exitFullscreen()
}
}

/* DEVICE BUTTONS */

document.querySelectorAll(".preview-toolbar button[data-size]").forEach(btn=>{
btn.onclick=()=>{
frame.className=btn.dataset.size
}
})

/* DOWNLOAD */

document.getElementById("downloadBtn").onclick=()=>{
const blob=new Blob([code.value],{type:"text/html"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="project.html"
a.click()

URL.revokeObjectURL(url)
}

/* RESIZE */

let resizing=false

resizer.onmousedown=()=>resizing=true
document.onmouseup=()=>resizing=false

document.onmousemove=e=>{
if(!resizing)return
const rect=document.querySelector(".main").getBoundingClientRect()
let w=e.clientX-rect.left
left.style.flex=`0 0 ${w}px`
}

updateLines()
updatePreview()

</script>

</body>
</html>
