```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Try HTML – Live Editor</title>

<style>

:root{
--bg-page:#ffffff;
--bg-editor:linear-gradient(135deg,#fffaf0,#fff0e6);
--text:#1a1a2e;
--accent-start:#fed7aa;
--accent-end:#fbbf24;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
height:100vh;
font-family:system-ui;
background:var(--bg-page);
color:var(--text);
overflow:hidden;
}

body.dark{
--bg-page:#0f172a;
--bg-editor:linear-gradient(135deg,#0f172a,#1e293b);
--text:#e5e7eb;
}

.app{height:100%;display:flex;flex-direction:column;}

header{
height:52px;
background:linear-gradient(to right,#fef3e8,#fff7ed);
border-bottom:1px solid #fed7aa;
display:flex;
align-items:center;
padding:0 20px;
font-weight:600;
}

.main{
flex:1;
display:flex;
padding:16px;
gap:16px;
}

.editor-panel{
flex:0 0 400px;
display:flex;
flex-direction:column;
background:var(--bg-editor);
border-radius:14px;
border:1px solid #fed7aa;
overflow:hidden;
position:relative;
}

.editor-header{
height:48px;
display:flex;
align-items:center;
padding:0 18px;
border-bottom:1px solid #fed7aa;
}

.download-btn{
position:absolute;
top:8px;
right:10px;
width:36px;
height:36px;
border-radius:8px;
border:2px solid;
border-image:linear-gradient(to right,var(--accent-start),var(--accent-end))1;
background:white;
cursor:pointer;
}

.code-area{flex:1;position:relative;}

#lineNumbers{
position:absolute;
left:0;
top:0;
bottom:0;
width:48px;
background:#fff7ed;
padding-top:16px;
text-align:right;
padding-right:6px;
font-family:monospace;
font-size:14px;
}

#code{
position:absolute;
inset:0;
padding:16px 16px 16px 56px;
border:none;
outline:none;
font-family:monospace;
font-size:14px;
resize:none;
}

.resizer{
width:10px;
background:#f3f4f6;
cursor:col-resize;
}

.preview-panel{
flex:1;
display:flex;
flex-direction:column;
background:white;
border-radius:14px;
border:1px solid #e5e7eb;
overflow:hidden;
}

.preview-toolbar{
height:48px;
display:flex;
align-items:center;
gap:10px;
padding:0 16px;
border-bottom:1px solid #fed7aa;
background:#fffbeb;
}

.device-btn{
padding:6px 12px;
border-radius:8px;
border:2px solid transparent;
border-image:linear-gradient(to right,var(--accent-start),var(--accent-end))1;
background:white;
cursor:pointer;
}

.preview-content{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

#preview-frame{
width:100%;
height:100%;
border-radius:12px;
overflow:hidden;
border:2px solid;
border-image:linear-gradient(to right,var(--accent-start),var(--accent-end))1;
}

#preview{width:100%;height:100%;border:none;}

#preview-frame.desktop{max-width:1400px;}
#preview-frame.tablet{width:780px;}
#preview-frame.mobile{width:380px;}

</style>
</head>

<body>

<div class="app">

<header>Try HTML – See Changes Live</header>

<div class="main">

<div class="editor-panel" id="editorPanel">

<div class="editor-header">Write some HTML!</div>
<button class="download-btn" id="downloadBtn">↓</button>

<div class="code-area">
<div id="lineNumbers"></div>
<textarea id="code"></textarea>
</div>

</div>

<div class="resizer" id="resizer"></div>

<div class="preview-panel">

<div class="preview-toolbar">
<span>Preview:</span>

<button class="device-btn active" data-size="desktop">Computer</button>
<button class="device-btn" data-size="tablet">Tablet</button>
<button class="device-btn" data-size="mobile">Phone</button>
<button class="device-btn" id="fullscreenBtn">Fullscreen</button>

</div>

<div class="preview-content">
<div id="preview-frame" class="desktop">
<iframe id="preview"></iframe>
</div>
</div>

</div>

</div>
</div>

<script>

const code=document.getElementById("code")
const preview=document.getElementById("preview")
const numbers=document.getElementById("lineNumbers")
const frame=document.getElementById("preview-frame")
const buttons=document.querySelectorAll(".device-btn")
const resizer=document.getElementById("resizer")
const left=document.getElementById("editorPanel")
const downloadBtn=document.getElementById("downloadBtn")
const fullscreenBtn=document.getElementById("fullscreenBtn")

const STORAGE="playframe_code"

if(localStorage.getItem(STORAGE)){
code.value=localStorage.getItem(STORAGE)
}else{
code.value="<h1>Hello world</h1>"
}

function updateLines(){
const count=(code.value.match(/\n/g)||[]).length+1
numbers.textContent=Array.from({length:count},(_,i)=>i+1).join("\n")
}

function updatePreview(){
const doc=preview.contentDocument
doc.open()
doc.write(code.value)
doc.close()
}

function save(){
localStorage.setItem(STORAGE,code.value)
}

code.addEventListener("input",()=>{
updateLines()
updatePreview()
save()
})

code.addEventListener("scroll",()=>{
numbers.scrollTop=code.scrollTop
})

buttons.forEach(btn=>{
if(!btn.dataset.size)return
btn.addEventListener("click",()=>{
buttons.forEach(b=>b.classList.remove("active"))
btn.classList.add("active")
frame.className=btn.dataset.size
})
})

fullscreenBtn.onclick=()=>{
if(!document.fullscreenElement){
frame.requestFullscreen()
}else{
document.exitFullscreen()
}
}

function download(){
const blob=new Blob([code.value],{type:"text/html"})
const url=URL.createObjectURL(blob)

const a=document.createElement("a")
a.href=url
a.download="project.html"
a.click()

URL.revokeObjectURL(url)
}

downloadBtn.onclick=download

document.addEventListener("keydown",e=>{
if((e.ctrlKey||e.metaKey)&&e.key==="s"){
e.preventDefault()
download()
}
})

let resizing=false

resizer.onmousedown=()=>resizing=true
document.onmouseup=()=>resizing=false

document.onmousemove=e=>{
if(!resizing)return
const rect=document.querySelector(".main").getBoundingClientRect()
let w=e.clientX-rect.left
left.style.flex=`0 0 ${w}px`
}

function updateTheme(){
const hour=new Date().getHours()
if(hour>=19||hour<7){
document.body.classList.add("dark")
}else{
document.body.classList.remove("dark")
}
}

updateTheme()
setInterval(updateTheme,60000)

updateLines()
updatePreview()

</script>

</body>
</html>
```
